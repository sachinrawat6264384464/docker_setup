        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmenityRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AmenityRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AmenityRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
