  /api/utilities/bills/:
    get:
      operationId: utilities_bills_list
      description: |-
        Mixin for ViewSets that auto-applies HasModulePermission based on the 'module' attribute.

        Usage:
            class MyViewSet(ModulePermissionMixin, viewsets.ModelViewSet):
                module = 'properties'  # Required - maps to MODULE_PERMISSIONS keys
                staff_actions = ['create', 'update', 'destroy']  # Optional - actions requiring module perms
                ...

        Behaviour:
            - list/retrieve: IsAuthenticated (all logged-in users can read)
            - create/update/partial_update/destroy: HasModulePermission (checks module.action perm)
            - Custom @action methods: default to IsAuthenticated unless explicitly overridden
            - master_admin / super_admin always bypass permission checks (built into HasModulePermission)
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - cancelled
          - overdue
          - paid
          - pending
        description: |-
          * `pending` - Pending
          * `paid` - Paid
          * `overdue` - Overdue
          * `cancelled` - Cancelled
      - in: query
        name: tenant
        schema:
          type: string
          format: uuid
      - in: query
        name: unit
        schema:
          type: string
          format: uuid
      - in: query
        name: unit__building
        schema:
          type: string
          format: uuid
      - in: query
        name: utility_type
        schema:
          type: string
          format: uuid
      tags:
      - utilities
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUtilityBillList'
