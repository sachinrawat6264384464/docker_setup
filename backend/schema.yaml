  /api/v1/auth/permissions/:
    get:
      operationId: v1_auth_permissions_list
      description: |-
        CRUD for Permission records (the permission catalogue).
        Mostly read-only; seeded via management command.
      parameters:
      - in: query
        name: category
        schema:
          type: string
          enum:
          - amenity
          - calendar
          - communication
          - entertainment
          - maintenance
          - notification
          - parking
          - payment
          - property
          - report
          - security
          - settings
          - support
          - system
          - tenant
          - user
          - utility
          - vendor
          - visitor
        description: |-
          * `system` - System Management
          * `tenant` - Tenant Management
          * `user` - User Management
          * `property` - Property Management
          * `maintenance` - Maintenance
          * `payment` - Payments
          * `report` - Reports & Analytics
          * `amenity` - Amenities
          * `visitor` - Visitors
          * `parking` - Parking
          * `communication` - Communication
          * `notification` - Notifications
          * `security` - Security
          * `utility` - Utilities
          * `calendar` - Calendar & Events
          * `vendor` - Vendors
          * `entertainment` - Entertainment
          * `support` - Support
          * `settings` - Settings
      - in: query
        name: is_active
        schema:
          type: boolean
      - in: query
        name: module
        schema:
