      description: |-
        Mixin for ViewSets that auto-applies HasModulePermission based on the 'module' attribute.

        Usage:
            class MyViewSet(ModulePermissionMixin, viewsets.ModelViewSet):
                module = 'properties'  # Required - maps to MODULE_PERMISSIONS keys
                staff_actions = ['create', 'update', 'destroy']  # Optional - actions requiring module perms
                ...

        Behaviour:
            - list/retrieve: IsAuthenticated (all logged-in users can read)
            - create/update/partial_update/destroy: HasModulePermission (checks module.action perm)
            - Custom @action methods: default to IsAuthenticated unless explicitly overridden
            - master_admin / super_admin always bypass permission checks (built into HasModulePermission)
      parameters:
      - in: query
        name: follow_up_required
        schema:
          type: boolean
      - in: query
        name: inspection_type
        schema:
          type: string
          enum:
          - custom
          - maintenance
          - move_in
          - move_out
          - pest_control
          - routine
          - safety
        description: |-
          * `move_in` - Move-In
          * `move_out` - Move-Out
          * `routine` - Routine
          * `safety` - Safety
          * `pest_control` - Pest Control
          * `maintenance` - Maintenance
          * `custom` - Custom
      - in: query
        name: inspector
        schema:
          type: string
          format: uuid
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: result
        schema:
          type: string
          enum:
          - fail
          - partial
          - pass
          - pending
        description: |-
          * `pass` - Pass
          * `fail` - Fail
          * `partial` - Partial Pass
          * `pending` - Pending Review
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - cancelled
          - completed
          - in_progress
          - scheduled
        description: |-
          * `scheduled` - Scheduled
          * `in_progress` - In Progress
          * `completed` - Completed
          * `cancelled` - Cancelled
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedInspectionList'
