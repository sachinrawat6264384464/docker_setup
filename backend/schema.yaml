        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: role
        schema:
          type: string
          enum:
          - facility_manager
          - finance_billing_manager
          - maintenance_staff
          - master_admin
          - masteradmin
          - operations_manager
          - owner
          - platform_member
          - property_staff
          - sales_marketing_admin
          - security_guard
          - super_admin
          - super_admin_admin
          - superadmin
          - system_auditor
          - tech_support_lead
          - tenant
          - tenant_vendor
        description: |-
          * `master_admin` - Master Admin
          * `super_admin` - Super Admin
          * `masteradmin` - Master Admin
          * `superadmin` - Super Admin
          * `super_admin_admin` - Hub Administrator
          * `operations_manager` - Operations Manager
          * `tech_support_lead` - Tech Support Lead
          * `finance_billing_manager` - Finance Manager
          * `sales_marketing_admin` - Marketing Admin
          * `system_auditor` - System Auditor
          * `platform_member` - Platform Member
          * `facility_manager` - Facility Manager
          * `property_staff` - Property Staff
          * `owner` - Owner
          * `tenant_vendor` - Vendor
          * `tenant` - Residents
          * `maintenance_staff` - Maintenance Staff
          * `security_guard` - Security Guard
      - in: query
        name: role__in
        schema:
          type: array
          items:
            type: string
        description: Multiple values may be separated by commas.
        explode: false
        style: form
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: tenant_id
        schema:
          type: string
      tags:
      - auth
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserList'
