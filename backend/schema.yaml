        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - cancelled
          - overdue
          - paid
          - pending
        description: |-
          * `pending` - Pending
          * `paid` - Paid
          * `overdue` - Overdue
          * `cancelled` - Cancelled
      - in: query
        name: tenant
        schema:
          type: string
          format: uuid
      - in: query
        name: unit
        schema:
          type: string
          format: uuid
      - in: query
        name: unit__building
        schema:
          type: string
          format: uuid
      - in: query
        name: utility_type
        schema:
          type: string
          format: uuid
