openapi: 3.0.3
info:
  title: PropFlow API Documentation
  version: 1.0.0
  description: Multi-Tenant Property Management Platform - Complete API Reference
paths:
  /api/amenities/amenities/:
    get:
      operationId: amenities_amenities_list
      description: |-
        Mixin for ViewSets that auto-applies HasModulePermission based on the 'module' attribute.

        Usage:
            class MyViewSet(ModulePermissionMixin, viewsets.ModelViewSet):
                module = 'properties'  # Required - maps to MODULE_PERMISSIONS keys
                staff_actions = ['create', 'update', 'destroy']  # Optional - actions requiring module perms
                ...

        Behaviour:
            - list/retrieve: IsAuthenticated (all logged-in users can read)
            - create/update/partial_update/destroy: HasModulePermission (checks module.action perm)
            - Custom @action methods: default to IsAuthenticated unless explicitly overridden
            - master_admin / super_admin always bypass permission checks (built into HasModulePermission)
      parameters:
      - in: query
        name: amenity_type
        schema:
          type: string
          enum:
          - bbq_area
          - clubhouse
          - conference_room
          - coworking
          - game_room
          - garden
          - gym
          - library
          - other
          - party_hall
          - playground
          - pool
          - rooftop
          - spa
          - sports_court
          - theater
        description: |-
          * `gym` - Gym/Fitness Center
          * `pool` - Swimming Pool
          * `clubhouse` - Clubhouse
          * `playground` - Playground
          * `sports_court` - Sports Court
          * `garden` - Garden/Park
          * `theater` - Theater/Auditorium
          * `conference_room` - Conference Room
          * `game_room` - Game Room
          * `library` - Library
          * `spa` - Spa/Sauna
          * `rooftop` - Rooftop Terrace
          * `bbq_area` - BBQ Area
          * `party_hall` - Party Hall
          * `coworking` - Co-working Space
          * `other` - Other
      - in: query
        name: building
        schema:
          type: string
      - in: query
        name: is_bookable
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - available
          - closed
          - maintenance
          - unavailable
        description: |-
          * `available` - Available
          * `unavailable` - Unavailable
          * `maintenance` - Under Maintenance
          * `closed` - Closed
      tags:
      - amenities
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAmenityListList'
          description: ''
    post:
      operationId: amenities_amenities_create
      description: |-
        Mixin for ViewSets that auto-applies HasModulePermission based on the 'module' attribute.

        Usage:
            class MyViewSet(ModulePermissionMixin, viewsets.ModelViewSet):
                module = 'properties'  # Required - maps to MODULE_PERMISSIONS keys
                staff_actions = ['create', 'update', 'destroy']  # Optional - actions requiring module perms
                ...

        Behaviour:
            - list/retrieve: IsAuthenticated (all logged-in users can read)
            - create/update/partial_update/destroy: HasModulePermission (checks module.action perm)
            - Custom @action methods: default to IsAuthenticated unless explicitly overridden
            - master_admin / super_admin always bypass permission checks (built into HasModulePermission)
      tags:
      - amenities
